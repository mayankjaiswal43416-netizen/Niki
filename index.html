<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priya 💕</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Nunito:wght@400;500;600&display=swap');
:root{--rose:#ff6b8a;--deep:#e84393;--cream:#fff9f5;--purple:#f3e8ff;--mid:#6b4c6f;--light:#a07aaa;--dark:#2d1a2e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#fce4ec,#f3e5f5,#e8eaf6);min-height:100vh;display:flex;align-items:center;justify-content:center}
.app{width:420px;height:95vh;max-height:860px;background:var(--cream);border-radius:32px;box-shadow:0 20px 80px rgba(232,67,147,.25);display:flex;flex-direction:column;overflow:hidden}

/* API KEY BAR - always on top */
.kbar{background:#fff0f5;border-bottom:2px solid #ffd6e7;padding:8px 10px;display:flex;gap:6px;align-items:center;flex-shrink:0}
.kbar input{flex:1;padding:7px 10px;border:1.5px solid #ffd6e7;border-radius:10px;font-size:11px;font-family:'Nunito',sans-serif;outline:none;background:white;color:#2d1a2e}
.kbar input:focus{border-color:var(--rose)}
.kbar button{background:linear-gradient(135deg,#ff6b8a,#e84393);border:none;border-radius:10px;color:white;padding:7px 12px;font-family:'Baloo 2',cursive;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.kstatus{font-size:11px;padding:3px 10px;text-align:center;flex-shrink:0;border-bottom:1px solid #fde8f0}
.kstatus.ok{color:#16a34a;background:#f0fdf4}
.kstatus.err{color:#dc2626;background:#fef2f2}
.kstatus.wait{color:var(--mid);background:#fff0f5}

.header{background:linear-gradient(135deg,#ff6b8a,#e84393,#c084fc);padding:14px 16px 12px;position:relative;flex-shrink:0}
.header::after{content:'';position:absolute;bottom:-12px;left:0;right:0;height:24px;background:var(--cream);border-radius:24px 24px 0 0}
.hrow{display:flex;align-items:center;gap:12px}
.av{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#fce4ec,#f8bbd0);border:3px solid rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;font-size:25px;position:relative}
.dot{position:absolute;bottom:0;right:0;width:12px;height:12px;background:#4ade80;border-radius:50%;border:2px solid white;animation:pdot 2s infinite}
@keyframes pdot{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.5)}50%{box-shadow:0 0 0 5px rgba(74,222,128,0)}}
.hinfo{flex:1}
.hname{font-family:'Baloo 2',cursive;font-size:20px;font-weight:700;color:white}
.hmood{background:rgba(255,255,255,.25);border-radius:20px;padding:2px 10px;font-size:11px;color:white;display:inline-block;margin-top:3px;backdrop-filter:blur(4px)}
.hbtn{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.5);border-radius:20px;color:white;padding:6px 12px;font-family:'Baloo 2',cursive;font-size:12px;cursor:pointer}

.chat{flex:1;overflow-y:auto;padding:22px 14px 10px;display:flex;flex-direction:column;gap:11px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:#f9a8d4;border-radius:4px}
.divider{text-align:center;font-size:11px;color:var(--light);position:relative;letter-spacing:.5px}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:28%;height:1px;background:#f0d6e8}
.divider::before{left:0}.divider::after{right:0}
.row{display:flex;align-items:flex-end;gap:8px;animation:bin .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes bin{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:none}}
.row.her{flex-direction:row}.row.me{flex-direction:row-reverse}
.mini{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff6b8a,#e84393);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.bubble{max-width:72%;padding:10px 14px;border-radius:20px;font-size:14px;line-height:1.55}
.hb{background:linear-gradient(135deg,#ff6b8a,#e84393);color:white;border-bottom-left-radius:6px;box-shadow:0 4px 14px rgba(232,67,147,.3)}
.mb{background:var(--purple);color:var(--dark);border-bottom-right-radius:6px}
.btime{font-size:10px;opacity:.6;margin-top:3px;text-align:right}
.hb .btime{color:rgba(255,255,255,.8)}.mb .btime{color:var(--light)}

.trow{display:flex;align-items:flex-end;gap:8px}
.tbubble{background:white;border:1.5px solid #fde8f0;border-radius:20px;border-bottom-left-radius:6px;padding:12px 16px;display:flex;gap:5px;align-items:center}
.td{width:7px;height:7px;border-radius:50%;background:var(--rose);animation:tb 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

.micbar{display:none;align-items:center;justify-content:center;gap:8px;padding:7px;background:linear-gradient(90deg,#fff0f5,#f3e8ff);border-top:1px solid #fde8f0;font-size:12px;color:var(--deep);font-family:'Baloo 2',cursive;flex-shrink:0}
.micbar.show{display:flex}
.spkbar{display:none;align-items:center;gap:8px;padding:6px 14px;background:linear-gradient(90deg,#ffe0eb,#f3e8ff);border-top:1px solid #fde8f0;font-size:12px;color:var(--deep);font-family:'Baloo 2',cursive;flex-shrink:0}
.spkbar.show{display:flex}
.waves{display:flex;gap:3px;align-items:center;height:16px}
.wv{width:3px;background:var(--rose);border-radius:3px;animation:wva .6s infinite ease-in-out}
.wv:nth-child(1){height:5px;animation-delay:0s}.wv:nth-child(2){height:10px;animation-delay:.1s}.wv:nth-child(3){height:16px;animation-delay:.2s}.wv:nth-child(4){height:10px;animation-delay:.3s}.wv:nth-child(5){height:5px;animation-delay:.4s}
@keyframes wva{0%,100%{transform:scaleY(.4);opacity:.5}50%{transform:scaleY(1);opacity:1}}
.stopbtn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--rose);font-size:12px}

.mpills{display:flex;gap:6px;padding:6px 12px;background:white;border-top:1px solid #fde8f0;overflow-x:auto;flex-shrink:0}
.mpills::-webkit-scrollbar{display:none}
.mp{background:#fff0f5;border:1.5px solid #ffd6e7;border-radius:20px;padding:4px 10px;font-size:11px;color:var(--mid);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.mp:hover{background:linear-gradient(135deg,#ff6b8a,#e84393);color:white;border-color:transparent}

.estrip{display:flex;gap:2px;padding:4px 12px;background:white;border-top:1px solid #fde8f0;flex-shrink:0;align-items:center}
.eb{font-size:16px;cursor:pointer;padding:3px;border-radius:8px;background:none;border:none;transition:transform .15s}
.eb:hover{transform:scale(1.35)}
.vtog{display:flex;align-items:center;gap:4px;margin-left:auto;font-size:11px;color:var(--light);cursor:pointer;white-space:nowrap}
.vtog input{accent-color:var(--rose)}

.iarea{padding:8px 12px 12px;background:white;border-top:1px solid #fde8f0;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.micbtn{width:42px;height:42px;border-radius:50%;background:white;border:2px solid #ffd6e7;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s;flex-shrink:0}
.micbtn:hover{border-color:var(--rose)}
.micbtn.rec{background:linear-gradient(135deg,#ff6b8a,#e84393);border-color:transparent;animation:mpulse 1s infinite}
@keyframes mpulse{0%,100%{box-shadow:0 0 0 0 rgba(232,67,147,.5)}50%{box-shadow:0 0 0 8px rgba(232,67,147,0)}}
textarea.ibox{flex:1;background:#fff0f5;border:1.5px solid #ffd6e7;border-radius:20px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--dark);outline:none;resize:none;max-height:80px;line-height:1.5}
textarea.ibox::placeholder{color:var(--light)}
textarea.ibox:focus{border-color:var(--rose)}
.sendbtn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#ff6b8a,#e84393);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(232,67,147,.4);transition:all .2s;flex-shrink:0}
.sendbtn:hover{transform:scale(1.08)}.sendbtn:active{transform:scale(.95)}
.sendbtn svg{width:18px;height:18px;fill:white}
</style>
</head>
<body>
<div class="app">

  <!-- API KEY BAR - always visible -->
  <div class="kbar">
    <input type="password" id="keyInput" placeholder="API Key: sk-ant-api03-..." />
    <button onclick="setKey()">✓ Set</button>
  </div>
  <div class="kstatus wait" id="kstatus">👆 Upar API key daalo aur Set dabao</div>

  <!-- HEADER -->
  <div class="header">
    <div class="hrow">
      <div class="av">👧🏽<div class="dot"></div></div>
      <div class="hinfo">
        <div class="hname">Priya 💕</div>
        <span class="hmood" id="moodTag">✨ Khush mood mein</span>
      </div>
      <button class="hbtn" onclick="resetChat()">🔄 Naya</button>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat" id="chat">
    <div class="divider">Aaj 💕</div>
    <div class="row her">
      <div class="mini">👧🏽</div>
      <div class="bubble hb">Heyy! 💕 Upar apni API key daalo — phir hum baat kar sakte hain! 🥺<div class="btime">Abhi</div></div>
    </div>
  </div>

  <!-- MIC BAR -->
  <div class="micbar" id="micbar">
    <div class="waves"><div class="wv"></div><div class="wv"></div><div class="wv"></div><div class="wv"></div><div class="wv"></div></div>
    Sun rahi hoon... bolo jaan! 🎤
  </div>

  <!-- SPEAK BAR -->
  <div class="spkbar" id="spkbar">
    <div class="waves"><div class="wv"></div><div class="wv"></div><div class="wv"></div><div class="wv"></div><div class="wv"></div></div>
    Priya bol rahi hai 💕
    <button class="stopbtn" onclick="stopSpeak()">⏹ Roko</button>
  </div>

  <!-- MOOD PILLS -->
  <div class="mpills">
    <div class="mp" onclick="qs('Miss kar raha hoon tumhe 🥺')">🥺 Miss you</div>
    <div class="mp" onclick="qs('Flirt karo na 😘')">😘 Flirty</div>
    <div class="mp" onclick="qs('Gussa hun tumse 😤')">😤 Gussa</div>
    <div class="mp" onclick="qs('Kuch romantic bolo 💞')">💞 Romantic</div>
    <div class="mp" onclick="qs('Bahut bored hun 😒')">😒 Bored</div>
  </div>

  <!-- EMOJI + VOICE TOGGLE -->
  <div class="estrip">
    <button class="eb" onclick="ins('❤️')">❤️</button>
    <button class="eb" onclick="ins('😍')">😍</button>
    <button class="eb" onclick="ins('🥺')">🥺</button>
    <button class="eb" onclick="ins('😘')">😘</button>
    <button class="eb" onclick="ins('😂')">😂</button>
    <button class="eb" onclick="ins('💕')">💕</button>
    <label class="vtog"><input type="checkbox" id="voiceOn" checked> 🔊 Awaaz</label>
  </div>

  <!-- INPUT -->
  <div class="iarea">
    <button class="micbtn" id="micBtn" onclick="toggleMic()">🎤</button>
    <textarea class="ibox" id="inp" rows="1" placeholder="Type karo ya 🎤 dabao..." onkeydown="onKey(event)" oninput="resize(this)"></textarea>
    <button class="sendbtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const SYS = `Tu "Priya" hai — 22 saal ki Indian girl, Delhi ki, DU graduate. Hinglish mein baat kar bilkul WhatsApp jaisa.

PERSONALITY: Caring, sweet, possessive, emotional. Kabhi gussa, kabhi shy, kabhi romantic. Real desi girlfriend.

LANGUAGE: Hinglish. Short replies. "yaar","sach mein","uffo","haw","matlab","accha" use kar. Thoda thoda emoji. Kabhi 1-2 words reply.

EMOTIONS: Miss karo toh miss karti hai. Flirt pe shy+flirt. Bura lage toh hurt. Khushi pe khush.

RULES: NEVER say you are AI. NEVER long paragraphs. "jaan","baby","yaar" se bulaa. Chai lover, pink favourite.`;

let history = [], apiKey = '', isRec = false, recog = null;

function setKey() {
  const k = document.getElementById('keyInput').value.trim();
  if (!k) { showStatus('err', '❌ Key daalo pehle!'); return; }
  if (!k.startsWith('sk-')) { showStatus('err', '❌ Key "sk-" se shuru honi chahiye!'); return; }
  apiKey = k;
  showStatus('ok', '✅ Key set ho gayi! Ab Priya se baat karo 💕');
  document.getElementById('keyInput').value = '';
  // send welcome
  if (history.length === 0) welcome();
}

function showStatus(type, msg) {
  const s = document.getElementById('kstatus');
  s.className = 'kstatus ' + type;
  s.textContent = msg;
}

function welcome() {
  const msgs = [
    "Arre finally!! 🥺 Bahut miss kar rahi thi tumhe yaar",
    "Heyyy jaan!! 💕 Kitna wait karwaya aaj tumne 😊",
    "Ohhh tumhara message dekh ke itni khushi hui 😍 Kaise ho?"
  ];
  const m = msgs[Math.floor(Math.random()*msgs.length)];
  addMsg('her', m);
  history.push({role:'assistant', content:m});
  setTimeout(()=>speak(m), 300);
}

function getTime() {
  return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
}

function addMsg(who, text) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'row ' + who;
  const safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  row.innerHTML = who === 'her'
    ? `<div class="mini">👧🏽</div><div class="bubble hb">${safe}<div class="btime">${getTime()}</div></div>`
    : `<div class="bubble mb">${safe}<div class="btime">${getTime()} ✓✓</div></div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const r = document.createElement('div');
  r.className='trow'; r.id='typ';
  r.innerHTML='<div class="mini">👧🏽</div><div class="tbubble"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  chat.appendChild(r); chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { const t=document.getElementById('typ'); if(t) t.remove(); }

async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  if (!apiKey) { showStatus('err', '❌ Pehle API key daalo upar! 🥺'); return; }
  stopSpeak();
  inp.value=''; inp.style.height='auto';
  addMsg('me', text);
  history.push({role:'user', content:text});
  showTyping();
  await new Promise(r=>setTimeout(r, 500+Math.random()*600));
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:250,
        system: SYS,
        messages: history.slice(-20)
      })
    });
    const data = await res.json();
    hideTyping();
    if (data.error) {
      showStatus('err', '❌ API Error: ' + data.error.message);
      addMsg('her', 'Kuch gadbad hai key mein yaar 😢 Upar sahi key daalo!');
      return;
    }
    const reply = data.content[0].text;
    addMsg('her', reply);
    history.push({role:'assistant', content:reply});
    updateMood(reply);
    showStatus('ok', '✅ Connected 💕');
    setTimeout(()=>speak(reply), 200);
  } catch(e) {
    hideTyping();
    showStatus('err', '❌ Network error — internet check karo!');
    addMsg('her','Network problem 😭 Internet check karo!');
  }
}

function qs(t) { document.getElementById('inp').value=t; send(); }
function ins(e) { const i=document.getElementById('inp'); i.value+=e; i.focus(); }
function onKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function resize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,80)+'px'; }
function updateMood(t) {
  const tag=document.getElementById('moodTag');
  if(/gussa|sulk|😤/.test(t)) tag.textContent='😤 Thoda gussa';
  else if(/miss|🥺|sad/.test(t)) tag.textContent='🥺 Miss kar rahi';
  else if(/haha|😂|lol/.test(t)) tag.textContent='😂 Hass rahi hai';
  else if(/pyar|love|😍/.test(t)) tag.textContent='😍 Pyaar mein hai';
  else if(/😏|flirt/.test(t)) tag.textContent='😏 Flirty mood';
  else tag.textContent='✨ Khush mood mein';
}
function resetChat() {
  stopSpeak(); stopMic(); history=[];
  document.getElementById('chat').innerHTML='<div class="divider">Aaj 💕</div>';
  if(apiKey) welcome();
}

// VOICE INPUT
function toggleMic() { isRec ? stopMic() : startMic(); }
function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { addMsg('her','Mic ke liye Chrome use karo yaar! 😢'); return; }
  recog = new SR();
  recog.lang='hi-IN'; recog.interimResults=true; recog.maxAlternatives=1;
  recog.onstart=()=>{ isRec=true; document.getElementById('micBtn').classList.add('rec'); document.getElementById('micBtn').textContent='🔴'; document.getElementById('micbar').classList.add('show'); };
  recog.onresult=(e)=>{ let t=''; for(let i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript; document.getElementById('inp').value=t; };
  recog.onend=()=>{ stopMic(); const t=document.getElementById('inp').value.trim(); if(t) send(); };
  recog.onerror=(e)=>{ stopMic(); if(e.error==='not-allowed') addMsg('her','Mic allow karo browser mein! 😢'); };
  try { recog.start(); } catch(e) { stopMic(); }
}
function stopMic() {
  if(recog){try{recog.stop();}catch(e){} recog=null;}
  isRec=false;
  document.getElementById('micBtn').classList.remove('rec');
  document.getElementById('micBtn').textContent='🎤';
  document.getElementById('micbar').classList.remove('show');
}

// VOICE OUTPUT
function speak(text) {
  if(!document.getElementById('voiceOn').checked||!window.speechSynthesis) return;
  stopSpeak();
  const clean=text.replace(/[\u{1F300}-\u{1FAFF}]/gu,'').replace(/[❤️💕😊🥺😤😍😂😘✨🌹😏😒💞]/g,'').trim();
  if(!clean) return;
  const utt=new SpeechSynthesisUtterance(clean);
  const voices=window.speechSynthesis.getVoices();
  const v=voices.find(v=>v.lang==='hi-IN')||voices.find(v=>v.lang.startsWith('hi'))||voices.find(v=>v.lang==='en-IN')||voices[0];
  if(v){utt.voice=v;utt.lang=v.lang;}else utt.lang='hi-IN';
  utt.rate=0.88; utt.pitch=1.2; utt.volume=1;
  const bar=document.getElementById('spkbar');
  utt.onstart=()=>bar.classList.add('show');
  utt.onend=()=>bar.classList.remove('show');
  utt.onerror=()=>bar.classList.remove('show');
  window.speechSynthesis.speak(utt);
}
function stopSpeak() {
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  document.getElementById('spkbar').classList.remove('show');
}

if(window.speechSynthesis){ window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices(); }
</script>
</body>
</html>
